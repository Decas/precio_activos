name: Fetch closing prices

on:
  schedule:
    # Ejecuta todos los días a las 20:00 UTC, que son las 17:00 en Argentina
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 schedule pandas pytz

      - name: Ejecutar script
        run: python -c "import fetch_closing_prices; fetch_closing_prices.job()"

      - name: Subir CSV al repositorio
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add closing_prices.csv
          if git diff --staged --quiet; then
            echo "No hay cambios para commitear"
          else
            git commit -m "Actualizar CSV de precios"
            git push
          fi
